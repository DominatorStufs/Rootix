name: Build & Release Rootix launcher

# Manual trigger only - go to Actions tab -> "Build & Release Rootix" -> "Run workflow"
on:
  workflow_dispatch:

env:
  # Bump this manually before every run you want published as a new release (V1, V2, V3...)
  RELEASE_VERSION: V1

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Make gradlew executable
        run: chmod +x gradlew

      # If you add the KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD
      # secrets in repo Settings -> Secrets and variables -> Actions, your real
      # signing key is used. Otherwise a throwaway keystore is generated so the
      # build still succeeds (fine for testing, NOT for a real Play Store release).
      - name: Decode signing keystore from secret
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Generate throwaway keystore (no KEYSTORE_BASE64 secret set)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          keytool -genkeypair -v \
            -keystore release.jks \
            -alias rootix-alias \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass rootix123 -keypass rootix123 \
            -dname "CN=Rootix, OU=Rootix, O=Rootix, L=NA, S=NA, C=IN"

      - name: Write local.properties for signing
        run: |
          echo "storeFile=release.jks" >> local.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD || 'rootix123' }}" >> local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS || 'rootix-alias' }}" >> local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD || 'rootix123' }}" >> local.properties

      - name: Build release APK
        run: ./gradlew assembleFdroidRelease --stacktrace

      - name: Rename APK with release version
        run: |
          mkdir -p release-output
          cp app/build/outputs/apk/fdroid/release/app-fdroid-release.apk "release-output/Rootix-${RELEASE_VERSION}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Rootix ${{ env.RELEASE_VERSION }}
          files: release-output/Rootix-${{ env.RELEASE_VERSION }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}