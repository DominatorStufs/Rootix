name: Build & Release Rootix

on:
  workflow_dispatch:

env:
  RELEASE_VERSION: v1

permissions:
  contents: write

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # The app is configured to always sign debug AND release builds using
      # signingConfigs.release (see app/build.gradle), which needs a keystore
      # file at "release.jks" in the project root.
      #
      # If you add repository secrets (KEYSTORE_BASE64, KEYSTORE_PASSWORD,
      # KEY_ALIAS, KEY_PASSWORD) your real signing key will be used.
      # Otherwise this step generates a throwaway keystore automatically so
      # the workflow still builds and produces an installable (self-signed) APK.
      - name: Prepare signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using keystore from repository secrets"
            echo "$KEYSTORE_BASE64" | base64 -d > release.jks
            {
              echo "storeFile=release.jks"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } >> local.properties
          else
            echo "No signing secrets found, generating a throwaway keystore"
            keytool -genkeypair -v \
              -keystore release.jks \
              -storepass rootixbuild \
              -alias rootix-alias \
              -keypass rootixbuild \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Rootix, OU=Rootix, O=DominatorStufs, L=Unknown, S=Unknown, C=IN"
            {
              echo "storeFile=release.jks"
              echo "storePassword=rootixbuild"
              echo "keyAlias=rootix-alias"
              echo "keyPassword=rootixbuild"
            } >> local.properties
          fi

      - name: Build release APKs
        run: ./gradlew assembleRelease --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" -exec cp {} artifacts/ \;
          ls -la artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rootix-apks-${{ env.RELEASE_VERSION }}
          path: artifacts/*.apk

      - name: Create/update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Rootix ${{ env.RELEASE_VERSION }}
          draft: false
          prerelease: false
          files: artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
